<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- Anneau accent dore (chaleur, soin, identite locale) -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#ring)" stroke-width="10"
          stroke-dasharray="280 1280" stroke-linecap="round"
          transform="rotate(-100 256 256)"/>

  <!-- Ligne de vie / pulsation, en arc subtil derriere la croix -->
  <path d="M 110 300 L 175 300 L 200 250 L 230 340 L 260 230 L 285 300 L 402 300"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Croix medicale -->
  <g>
    <rect x="221" y="146" width="70" height="220" rx="18" fill="#FFFFFF"/>
    <rect x="146" y="221" width="220" height="70" rx="18" fill="#FFFFFF"/>
  </g>

  <!-- Petit coeur au centre pour le soin/la famille -->
  <path d="M256 246
           c-10,-16 -34,-16 -44,-2
           c-9,12 -6,28 6,40
           l38,36 l38,-36
           c12,-12 15,-28 6,-40
           c-10,-14 -34,-14 -44,2 Z"
        fill="#E53935" opacity="0.92"/>
</svg>
