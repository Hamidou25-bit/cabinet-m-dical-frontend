name: Déploiement VPS (frontend)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # La clé DEPLOY_SSH_KEY est restreinte côté serveur (authorized_keys, option
      # command=) : quelle que soit la commande envoyée ici, le serveur exécute
      # toujours `sudo /usr/local/bin/deploy-frontend.sh`.
      - name: Déployer sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: echo "déploiement déclenché"

      - name: Vérifier que le site répond
        run: |
          sleep 5
          curl -sf https://cabinet-babamouneissa.com/index.html -o /dev/null
