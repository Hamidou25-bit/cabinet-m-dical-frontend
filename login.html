<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cabinet Médical BabaMouneissa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/icon-32x32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
    <meta name="theme-color" content="#1565C0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BabaMouneissa">
</head>
<body>

<div class="login-page">
    <div class="login-box">
        <div class="login-logo">🏥</div>
        <h2>Cabinet Médical</h2>
        <p class="subtitle">BabaMouneissa</p>

        <div class="login-error" id="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" id="nom_utilisateur" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="mot_de_passe" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
    </div>
</div>

<script>
const API_URL = (location.hostname === "cabinet-babamouneissa.com" || location.hostname === "www.cabinet-babamouneissa.com")
    ? "https://" + location.hostname + "/api"
    : (location.hostname === "51.161.10.252" ? "http://51.161.10.252/api" : "http://localhost:8001");

if (localStorage.getItem("token")) {
    window.location.href = "index.html";
}

document.getElementById("login-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nom_utilisateur = document.getElementById("nom_utilisateur").value;
    const mot_de_passe = document.getElementById("mot_de_passe").value;
    const errorBox = document.getElementById("login-error");
    errorBox.classList.remove("active");

    try {
        const response = await fetch(API_URL + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nom_utilisateur, mot_de_passe })
        });

        if (!response.ok) {
            errorBox.textContent = "Identifiant ou mot de passe incorrect";
            errorBox.classList.add("active");
            return;
        }

        const data = await response.json();
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("nom_utilisateur", data.nom_utilisateur);
        localStorage.setItem("role", data.role);

        window.location.href = "index.html";

    } catch (err) {
        errorBox.textContent = "Erreur de connexion au serveur";
        errorBox.classList.add("active");
    }
});
</script>
<script src="js/sw-register.js"></script>

</body>
</html>
